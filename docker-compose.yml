services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-me}"
      ALLOWED_HOST_KEYS: "${ALLOWED_HOST_KEYS:-host-dev-001}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${HTTP_PORT:-8080}:80"
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
    network_mode: host
    environment:
      BACKEND_WS_URL: "${BACKEND_WS_URL:-ws://127.0.0.1:8080/agent-ws}"
      AGENT_SHARED_SECRET: "${AGENT_SHARED_SECRET:-host-dev-001}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - frontend
